<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{{request.client.name}}</title>
  
  <meta name="description" content="{{description}}">
  
  <link rel="shortcut icon" type="image/png" href="{{request.client.favicon_url}}">
  
  <!--<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <header>
    <a href="/" class="home-link">
      <img src="{{request.client.logo_url}}" class="light-only"/>
      <img src="{{request.client.logo_url_dark}}" class="dark-only"/>
      <!--<span>{{request.client.name}}</span>-->
    </a>
    {% if request.user %}
      <a href="/profile" class="clk-solid profile">
        {{request.user.name[:1]}}
      </a>
    {% else %}
      <a href="/login" class="clk-solid">Login</a>
    {% endif %}
  </header>
  
  <nav class="main-menu">
    <label for="main-menu-toggle">☰</label>
    <input type="checkbox" id="main-menu-toggle"/>
    <div class="link-list">
      <a href="/">
        <img src="/static/icons/target.png">
        <span>Jobs For You</span>
     </a>
      <a href="/starred">
        <img src="/static/icons/star.png">
        <span>Starred Jobs</span>
      </a>
      <a href="/applied">
        <img src="/static/icons/checkmark.png">
        <span>Applied Jobs</span>
      </a>
      <a href="/custom-resumes">
        <img src="/static/icons/doc-spanner.png">
        <span>Customized Resumes</span>
      </a>
      <a href="/profile">
        <img src="/static/icons/blank-face.png">
        <span>My Profile</span>
      </a>
    </div>
  </nav>
  
  <main>
    {{content | safe}}
  </main>
  
  <script>
    function confirmBeforeSubmit(event) {
      const confirmation = window.confirm("This action will cost you 10 credits. Continue?");
      if(confirmation) {
        document.querySelector('#loading-block').style.display = 'grid';
        return true;
      } else {
        return false;
      }
    }
  </script>
  
  <div id="loading-block">
    AI Is Working
    <br>
    Please Wait...
  </div>
    
</body>
</html>
